<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Halaman Tidak Ditemukan | Viewly Labib</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --dark: #1a1714;
      --muted: #7a7269;
      --accent: #c8a96e;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 400;
      line-height: 1;
      color: var(--dark);
      opacity: 0.08;
      user-select: none;
    }

    .icon {
      font-size: 2.5rem;
      margin: -1rem 0 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 400;
      margin-bottom: 0.75rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    p {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
      max-width: 320px;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    a {
      display: inline-block;
      padding: 0.6rem 1.8rem;
      background: var(--dark);
      color: var(--cream);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      border-radius: 100px;
      transition: background 0.2s ease;
    }

    a:hover { background: var(--accent); }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="code">404</div>
  <div class="icon">📷</div>
  <h1>Halaman <em>tidak</em> ditemukan</h1>
  <p>Sepertinya halaman yang kamu cari sudah dipindah, dihapus, atau memang tidak pernah ada.</p>
  <a href="/">← Kembali ke Galeri</a>

  <footer>viewly.labibalwasi.com</footer>

</body>
</html>
